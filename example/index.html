<!DOCTYPE html>
<html lang="en">

<head>
    <title>PiCO Template</title>
    <link rel="icon" type="image/x-icon" href="favicon.ico">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="style.css">
    <script src="index.ts" type="module" defer></script>
</head>

<body id="app">

    <div id="main-content">
        <canvas id="canvas"></canvas>

        <!-- Sidebar -->
        <div id="sidebar">
            <div id="sidebar-title">Cells</div>

            <!-- Holds availble cells -->
            <div id="sidebar-cells"></div>
        </div>

    </div>

    <!-- Stats Overlay -->
    <div id="stats">

        <div id="time-avg" class="stats-block">
            <div class="stats-label">AVG</div>
            <div class="stats-sim">0.00ms</div>
            <div class="stats-render">0.00ms</div>
            <div class="stats-anim">0.00ms</div>
        </div>

        <div id="time-max" class="stats-block">
            <div class="stats-label">MAX</div>
            <div class="stats-sim">0.00ms</div>
            <div class="stats-render">0.00ms</div>
            <div class="stats-anim">0.00ms</div>
        </div>

    </div>

    </div>

</body>

</html>
